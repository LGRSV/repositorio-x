<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Portal do Cliente</title>
<style>
  :root{
    --bg:#F4F7F9; --surface:#FFFFFF; --surface-soft:#F7FAFB;
    --border:#E1E8EC; --border-strong:#CBD6DC;
    --text:#16232B; --muted:#64757E;
    --accent:#0F766E; --accent-hover:#0B5F58; --accent-soft:#E6F3F1;
    --danger:#C0392B; --radius:14px;
    --shadow:0 8px 30px rgba(16,35,43,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:
      radial-gradient(1000px 500px at 85% -10%, #E4F1EF 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #EAF1F4 0%, transparent 55%),
      var(--bg);
    display:flex;align-items:center;justify-content:center;
    padding:24px;min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;max-width:380px;background:var(--surface);
    border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:36px 32px 30px;
    animation:rise .5s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.card{animation:none}}
  .mark{
    display:flex;align-items:center;gap:10px;margin-bottom:6px;
  }
  .lock{
    width:34px;height:34px;border-radius:9px;flex:none;
    background:var(--accent-soft);display:grid;place-items:center;
  }
  .lock svg{width:17px;height:17px;stroke:var(--accent)}
  .brand{
    font-size:12px;font-weight:700;letter-spacing:.22em;
    text-transform:uppercase;color:var(--accent);
  }
  h1{font-size:21px;font-weight:650;margin:16px 0 4px;letter-spacing:-.01em}
  .sub{font-size:13.5px;color:var(--muted);line-height:1.5;margin-bottom:24px}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--text);margin:0 0 7px}
  .field{margin-bottom:16px}
  input{
    width:100%;font-size:15px;font-family:inherit;color:var(--text);
    padding:12px 13px;border:1.5px solid var(--border-strong);
    border-radius:10px;background:var(--surface-soft);
    transition:border-color .15s, box-shadow .15s, background .15s;
  }
  input::placeholder{color:#9AA7AF}
  input:focus{
    outline:none;border-color:var(--accent);background:#fff;
    box-shadow:0 0 0 3px rgba(15,118,110,.14);
  }
  button{
    width:100%;font-size:15px;font-weight:650;font-family:inherit;
    color:#fff;background:var(--accent);border:none;border-radius:10px;
    padding:13px;cursor:pointer;margin-top:6px;
    transition:background .15s, transform .05s;
  }
  button:hover{background:var(--accent-hover)}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.7;cursor:default}
  .msg{
    font-size:13px;line-height:1.45;margin-top:16px;padding:11px 13px;
    border-radius:9px;display:none;
  }
  .msg.err{display:block;background:#FCEEED;color:var(--danger);border:1px solid #F2CFCB}
  .msg.ok{display:block;background:var(--accent-soft);color:var(--accent-hover);border:1px solid #C7E6E1}
  .foot{margin-top:22px;font-size:11.5px;color:#9AA7AF;text-align:center}
</style>
</head>
<body>
  <main class="card">
    <div class="mark">
      <span class="lock">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="10.5" width="16" height="10" rx="2"/><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"/>
        </svg>
      </span>
      <span class="brand">Portal</span>
    </div>
    <h1>Acesso do cliente</h1>
    <p class="sub">Entre com seu nome e senha para ver o conteúdo liberado para você.</p>

    <div class="field">
      <label for="nome">Nome</label>
      <input id="nome" type="text" autocomplete="username" placeholder="Seu nome" autofocus>
    </div>
    <div class="field">
      <label for="senha">Senha</label>
      <input id="senha" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button id="btn">Entrar</button>
    <div id="msg" class="msg"></div>

    <p class="foot">Acesso restrito</p>
  </main>

<script>
  const $ = s => document.querySelector(s);
  const nome = $('#nome'), senha = $('#senha'), btn = $('#btn'), msg = $('#msg');

  function show(type, text){ msg.className = 'msg ' + type; msg.textContent = text; }

  async function sha256Hex(text){
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function entrar(){
    const n = nome.value.trim(), s = senha.value;
    if(!n || !s){ show('err','Preencha nome e senha.'); return; }
    btn.disabled = true; btn.textContent = 'Verificando…'; msg.className='msg';
    try{
      const res = await fetch('./clientes.json?t=' + Date.now(), {cache:'no-store'});
      if(!res.ok) throw new Error('fetch');
      const data = await res.json();
      const lista = Array.isArray(data.clientes) ? data.clientes : [];
      const alvo = lista.find(c => (c.nome||'').trim().toLowerCase() === n.toLowerCase());
      const hash = await sha256Hex(s);
      if(alvo && hash === alvo.senha){
        show('ok','Acesso liberado. Redirecionando…');
        setTimeout(()=>{ window.location.href = 'conteudos/' + alvo.arquivo; }, 500);
        return;
      }
      show('err','Nome ou senha incorretos.');
    }catch(e){
      show('err','Não foi possível carregar a lista de acesso. Tente novamente.');
    }finally{
      if(msg.classList.contains('ok')===false){ btn.disabled=false; btn.textContent='Entrar'; }
    }
  }

  btn.addEventListener('click', entrar);
  senha.addEventListener('keydown', e => { if(e.key==='Enter') entrar(); });
  nome.addEventListener('keydown', e => { if(e.key==='Enter') senha.focus(); });
</script>
</body>
</html>
